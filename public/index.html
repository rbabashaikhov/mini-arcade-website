<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="app-shell">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="brand sidebar-brand">
              <img src="./assets/logo.svg" alt="Arcade Lab logo" class="logo" />
              <div class="brand-text">
                <p class="eyebrow">Mini Arcade</p>
                <h1>Arcade Lab</h1>
              </div>
            </div>
            <button
              id="sidebarToggle"
              class="icon-button"
              type="button"
              aria-label="Collapse sidebar"
            >
              <span class="chevron" aria-hidden="true">‹</span>
            </button>
          </div>

          <label class="search sidebar-search">
            <span class="sr-only">Search games</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Search games"
              autocomplete="off"
            />
          </label>

          <div class="sidebar-meta">
            <p id="gamesCount" class="muted">Loading...</p>
          </div>

          <nav id="cardsGrid" class="nav-list" aria-live="polite"></nav>

          <div class="sidebar-footer">
            <button id="themeToggle" class="ghost-button" type="button">
              Toggle theme
            </button>
          </div>
        </aside>

        <button
          id="sidebarOverlay"
          class="sidebar-overlay"
          type="button"
          aria-label="Close game menu"
        ></button>

        <main class="main">
          <header class="main-header">
            <button
              id="mobileMenuBtn"
              class="icon-button"
              type="button"
              aria-label="Open game menu"
            >
              <span class="menu-icon" aria-hidden="true">☰</span>
            </button>
            <div class="now-playing">
              <h2 id="nowPlayingTitle">Select a game</h2>
              <p id="controlsHint" class="muted">Choose a game to begin.</p>
            </div>
            <div class="controls-bar" role="group" aria-label="Game controls">
              <button id="restartBtn" class="primary-button" type="button">
                Restart
              </button>
              <button id="fullscreenBtn" class="ghost-button" type="button">
                Fullscreen
              </button>
              <button id="openBtn" class="ghost-button" type="button">
                Open in new tab
              </button>
            </div>
          </header>

          <div class="stage-wrapper">
            <div class="play-area">
              <div id="iframeLoader" class="iframe-loader" aria-hidden="true">
                <div class="spinner"></div>
                <span>Loading game...</span>
              </div>
              <iframe
                id="gameFrame"
                title="Mini Arcade game"
                loading="lazy"
                scrolling="no"
                sandbox="allow-scripts allow-same-origin"
              ></iframe>
            </div>

            <aside class="stage-panel" id="stagePanel" aria-label="How to play">
              <p class="eyebrow">How to play</p>
              <p id="stagePanelHint" class="muted"></p>
            </aside>
          </div>
        </main>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
